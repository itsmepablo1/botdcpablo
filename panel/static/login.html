<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — Discord Bot Panel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #0a0a0f;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Animated background blobs */
    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.15;
      animation: float 8s ease-in-out infinite;
    }
    body::before {
      width: 500px; height: 500px;
      background: radial-gradient(circle, #7c3aed, #4f46e5);
      top: -150px; left: -150px;
    }
    body::after {
      width: 400px; height: 400px;
      background: radial-gradient(circle, #ec4899, #8b5cf6);
      bottom: -100px; right: -100px;
      animation-delay: -4s;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0) scale(1); }
      50%       { transform: translateY(-30px) scale(1.05); }
    }

    .login-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      backdrop-filter: blur(20px);
      border-radius: 24px;
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      z-index: 1;
      box-shadow: 0 25px 60px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.06);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
    }
    .logo-icon {
      width: 48px; height: 48px;
      background: linear-gradient(135deg, #7c3aed, #4f46e5);
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
      box-shadow: 0 8px 24px rgba(124,58,237,0.4);
    }
    .logo-text h1 { font-size: 20px; font-weight: 700; color: #fff; }
    .logo-text p  { font-size: 13px; color: rgba(255,255,255,0.4); margin-top: 2px; }

    h2 { font-size: 26px; font-weight: 700; color: #fff; margin-bottom: 8px; }
    .subtitle { font-size: 14px; color: rgba(255,255,255,0.45); margin-bottom: 32px; }

    .form-group { margin-bottom: 20px; }
    label { display: block; font-size: 13px; font-weight: 500; color: rgba(255,255,255,0.6); margin-bottom: 8px; }

    input {
      width: 100%;
      padding: 14px 16px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      color: #fff;
      font-size: 15px;
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: all 0.2s;
    }
    input:focus {
      border-color: rgba(124,58,237,0.6);
      background: rgba(124,58,237,0.08);
      box-shadow: 0 0 0 3px rgba(124,58,237,0.15);
    }
    input::placeholder { color: rgba(255,255,255,0.25); }

    .btn-login {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #7c3aed, #4f46e5);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      margin-top: 8px;
      transition: all 0.2s;
      box-shadow: 0 8px 24px rgba(124,58,237,0.4);
      position: relative;
      overflow: hidden;
    }
    .btn-login:hover  { transform: translateY(-2px); box-shadow: 0 12px 32px rgba(124,58,237,0.5); }
    .btn-login:active { transform: translateY(0); }
    .btn-login.loading { opacity: 0.7; pointer-events: none; }

    .error-msg {
      background: rgba(239,68,68,0.12);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 10px;
      padding: 12px 16px;
      color: #fca5a5;
      font-size: 14px;
      margin-bottom: 16px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="logo">
      <div class="logo-icon">🤖</div>
      <div class="logo-text">
        <h1>Bot Panel</h1>
        <p>Discord Bot Control</p>
      </div>
    </div>

    <h2>Selamat Datang</h2>
    <p class="subtitle">Login untuk mengakses control panel bot kamu.</p>

    <div class="error-msg" id="errorMsg"></div>

    <form id="loginForm">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" placeholder="Masukkan username..." autocomplete="username" required/>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Masukkan password..." autocomplete="current-password" required/>
      </div>
      <button type="submit" class="btn-login" id="loginBtn">🔐 Login ke Panel</button>
    </form>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      const err = document.getElementById('errorMsg');
      btn.classList.add('loading');
      btn.textContent = 'Logging in...';
      err.style.display = 'none';

      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        if (res.ok) {
          localStorage.setItem('bot_token', data.access_token);
          localStorage.setItem('bot_username', username);
          window.location.href = '/';
        } else {
          err.textContent = data.detail || 'Login gagal.';
          err.style.display = 'block';
        }
      } catch (ex) {
        err.textContent = 'Tidak bisa terhubung ke server.';
        err.style.display = 'block';
      }

      btn.classList.remove('loading');
      btn.textContent = '🔐 Login ke Panel';
    });

    // Already logged in?
    if (localStorage.getItem('bot_token')) window.location.href = '/';
  </script>
</body>
</html>
